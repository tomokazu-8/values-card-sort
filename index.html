<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>価値観カードソート — Miller et al. (2011)</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif;min-height:100vh;background:#f7f7f5;color:#1a1a1a}
.wrap{padding:1.25rem;max-width:680px;margin:0 auto}
h1{font-size:20px;font-weight:500;color:#1a1a1a;text-align:center;margin-bottom:3px}
.sub{font-size:12px;color:#888;text-align:center;margin-bottom:1.25rem}
.prog-bar{height:4px;background:#e0e0e0;border-radius:2px;margin-bottom:.4rem}
.prog-fill{height:100%;background:#555;border-radius:2px;transition:width .3s}
.prog-label{display:flex;justify-content:space-between;font-size:12px;color:#999;margin-bottom:1rem}
.card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:1.75rem;text-align:center;margin-bottom:1rem;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-num{font-size:11px;color:#bbb;margin-bottom:6px}
.card-ja{font-size:24px;font-weight:500;color:#1a1a1a;margin-bottom:4px}
.card-en{font-size:12px;color:#aaa;margin-bottom:12px}
.card-desc{font-size:13px;color:#666;line-height:1.7}
.btns{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:.75rem}
.btn-sort{padding:9px 3px;border:1px solid #e0e0e0;background:#fff;border-radius:8px;font-size:11px;cursor:pointer;color:#666;transition:all .15s;line-height:1.3;font-family:inherit}
.btn-most:hover{border-color:#c0392b;color:#c0392b;background:#fdf0ee}
.btn-very:hover{border-color:#e67e22;color:#e67e22;background:#fdf5ec}
.btn-imp:hover{border-color:#2980b9;color:#2980b9;background:#edf4fb}
.btn-some:hover{border-color:#7f8c8d;color:#7f8c8d;background:#f4f4f4}
.btn-not:hover{border-color:#bdc3c7;color:#bdc3c7;background:#fafafa}
.undo-row{margin-bottom:.5rem}
.btn-sm{padding:5px 12px;border:1px solid #ddd;background:#fff;border-radius:7px;font-size:12px;cursor:pointer;color:#666;font-family:inherit}
.btn-sm:hover{background:#f5f5f5}
.btn-sm:disabled{opacity:.3;cursor:default}
.sections{margin-top:.5rem}
.sec{border:1px solid #ebebeb;border-radius:10px;margin-bottom:8px;overflow:hidden;background:#fff}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;cursor:pointer;user-select:none}
.sec-hdr:hover{background:#fafafa}
.sec-title{font-size:13px;font-weight:500}
.sec-badge{font-size:11px;padding:2px 8px;border-radius:10px;background:#f0f0f0;color:#888}
.sec-arrow{font-size:10px;color:#bbb;transition:transform .2s}
.sec-body{padding:10px 14px 12px;border-top:1px solid #f0f0f0}
.tags{display:flex;flex-wrap:wrap;gap:5px}
.tag{padding:4px 10px;border-radius:7px;font-size:12px;cursor:pointer;border:1px solid transparent;transition:all .15s}
.move-menu{margin-top:8px;padding:8px 10px;border-radius:8px;background:#f7f7f5;border:1px solid #e8e8e8}
.move-label{font-size:11px;color:#999;margin-bottom:6px}
.move-btns{display:flex;gap:5px;flex-wrap:wrap}
.btn-move{padding:4px 10px;border-radius:7px;font-size:11px;cursor:pointer;font-family:inherit;border:1px solid #ddd;background:#fff;color:#666}
.btn-move:hover{background:#f0f0f0}
.done-box{background:#fff;border:1px solid #ebebeb;border-radius:10px;padding:1.25rem;margin-top:.75rem}
.done-title{font-size:13px;font-weight:500;color:#555;text-align:center;margin-bottom:.75rem}
.btn-dl{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.btn-dl.img{background:#1a1a1a;color:#fff;border:none}
.btn-dl.img:hover{background:#333}
.btn-dl.txt{background:#fff;border:1px solid #ddd;color:#555}
.btn-dl.txt:hover{background:#f5f5f5}
.btn-dl.txt.ok{color:#2e7d52;border-color:#a8d5b8}
.dl-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:.75rem}
pre.preview{background:#f7f7f5;border:1px solid #e8e8e8;border-radius:8px;padding:10px;font-size:11px;color:#666;max-height:220px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;line-height:1.5;font-family:'Noto Sans JP',monospace;user-select:all;margin-top:.5rem}
.narrow-box{background:#edf4fb;border:1px solid #b5d4f4;border-radius:10px;padding:12px 14px;margin-bottom:.75rem}
.narrow-title{font-size:13px;color:#2980b9;margin-bottom:.5rem}
.narrow-count{font-size:12px;font-weight:500;color:#2980b9}
.interview-box{background:#fff;border:1px solid #ebebeb;border-radius:10px;padding:1rem;margin-top:.75rem}
.interview-title{font-size:13px;font-weight:500;color:#555;margin-bottom:.75rem;line-height:1.6}
.q-card{background:#f7f7f5;border:1px solid #e8e8e8;border-radius:8px;padding:10px 12px;margin-bottom:6px;font-size:13px;color:#555;line-height:1.7;cursor:pointer;transition:border-color .15s}
.q-card:hover{border-color:#999;background:#f0f0ee}
.q-val{color:#1a1a1a;font-weight:500}
.q-hint{font-size:11px;color:#bbb;margin-top:6px}
.toggle-link{background:none;border:none;color:#aaa;font-size:12px;cursor:pointer;text-decoration:underline;display:block;text-align:center;margin-top:6px;font-family:inherit}
.footer{text-align:center;padding:1.5rem 0 2rem;font-size:11px;color:#ccc}
</style>
</head>
<body>
<div class="wrap">
  <h1>価値観カードソート</h1>
  <p class="sub">Personal Values Card Sort — Miller, C'de Baca, Matthews &amp; Wilbourne (University of New Mexico, 2011)</p>
  <div class="prog-bar"><div class="prog-fill" id="pf"></div></div>
  <div class="prog-label"><span id="pl1">0/100 完了</span><span id="pl2">残り 100 枚</span></div>
  <div id="main"></div>
  <div class="sections" id="secs"></div>
  <div class="footer">出典: Miller, C'de Baca, Matthews &amp; Wilbourne (2011) Personal Values Card Sort / University of New Mexico — Public Domain</div>
</div>
<script>

{id:45,ja:"希望",en:"Hope",desc:"ポジティブで楽観的な見通しを保つこと"},
{id:46,ja:"謙虚さ",en:"Humility",desc:"控えめで謙虚であること"},
{id:47,ja:"ユーモア",en:"Humor",desc:"自分や世界のおかしみに気づくこと"},
{id:48,ja:"想像力",en:"Imagination",desc:"夢を持ち、可能性を見出すこと"},

{id:51,ja:"内なる平和",en:"Inner Peace",desc:"心の平静を体験すること"},
{id:52,ja:"誠実さ・一貫性",en:"Integrity",desc:"自分の価値観と一致した日常生活を送ること"},
{id:53,ja:"知性",en:"Intelligence",desc:"心をいきいきと鋭く保つこと"},
{id:54,ja:"親密さ",en:"Intimacy",desc:"自分の内なる体験を他者と分かち合うこと"},
{id:55,ja:"正義",en:"Justice",desc:"公平で平等な扱いを促進すること"},
{id:56,ja:"知識",en:"Knowledge",desc:"学び、有益な知識を貢献すること"},
{id:57,ja:"リーダーシップ",en:"Leadership",desc:"他者を鼓舞し導くこと"},

{id:67,ja:"新奇性",en:"Novelty",desc:"変化と多様性に満ちた生活を送ること"},

{id:72,ja:"愛国心",en:"Patriotism",desc:"国を愛し、奉仕し、守ること"},

{id:74,ja:"人気",en:"Popularity",desc:"多くの人から好かれること"},
{id:75,ja:"権力",en:"Power",desc:"他者に対して支配力を持つこと"},
{id:76,ja:"実用性",en:"Practicality",desc:"実際的・賢明・分別ある事柄に集中すること"},
{id:77,ja:"保護",en:"Protect",desc:"愛する人を守り安全に保つこと"},
{id:78,ja:"扶養",en:"Provide",desc:"家族の面倒を見て支えること"},
{id:79,ja:"目的",en:"Purpose",desc:"人生に意味と方向性を持つこと"},
{id:80,ja:"合理性",en:"Rationality",desc:"理性・論理・証拠に導かれること"},
{id:81,ja:"現実主義",en:"Realism",desc:"現実的・実際的に見て行動すること"},
{id:82,ja:"責任",en:"Responsibility",desc:"責任ある決断をし、実行すること"},
{id:83,ja:"リスク",en:"Risk",desc:"危険や挑戦を冒すこと"},
{id:84,ja:"ロマンス",en:"Romance",desc:"人生に強烈でわくわくする愛を持つこと"},
{id:85,ja:"安全",en:"Safety",desc:"安全で安心であること"},
{id:86,ja:"自己受容",en:"Self-acceptance",desc:"ありのままの自分を受け入れること"},
{id:87,ja:"自制",en:"Self-control",desc:"自分の行動を律すること"},
{id:88,ja:"自尊心",en:"Self-esteem",desc:"自分を肯定的に感じること"},
{id:89,ja:"自己理解",en:"Self-knowledge",desc:"自分自身を深く正直に理解すること"},
{id:90,ja:"奉仕",en:"Service",desc:"他者に役立ち、奉仕すること"},
{id:91,ja:"性",en:"Sexuality",desc:"活発で満足のいく性生活を持つこと"},
{id:92,ja:"簡素さ",en:"Simplicity",desc:"最小限の必要で簡素に生きること"},
{id:93,ja:"独処",en:"Solitude",desc:"他者から離れる時間と空間を持つこと"},
{id:94,ja:"霊性",en:"Spirituality",desc:"霊的に成長し成熟すること"},
{id:95,ja:"安定",en:"Stability",desc:"一定した生活を送ること"},
{id:96,ja:"寛容",en:"Tolerance",desc:"自分と異なる人を受け入れ尊重すること"},
{id:97,ja:"伝統",en:"Tradition",desc:"過去の尊重された様式に従うこと"},
{id:98,ja:"徳",en:"Virtue",desc:"道徳的に純粋で優れた生活を送ること"},
{id:99,ja:"富",en:"Wealth",desc:"十分なお金を持つこと"},
{id:100,ja:"世界平和",en:"World Peace",desc:"世界の平和推進に取り組むこと"},
];

const CATS=[
  {key:"most",label:"最も重要",color:"#c0392b",bg:"#fdf0ee",border:"#e8a99a"},
  {key:"very",label:"とても重要",color:"#e67e22",bg:"#fdf5ec",border:"#f0c090"},
  {key:"imp", label:"重要",color:"#2980b9",bg:"#edf4fb",border:"#90bce0"},
  {key:"some",label:"やや重要",color:"#7f8c8d",bg:"#f4f4f4",border:"#bdc3c7"},
  {key:"not", label:"重要でない",color:"#bdc3c7",bg:"#fafafa",border:"#d5d8dc"},
];

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

let deck=shuffle([...V]);
let sorted={most:[],very:[],imp:[],some:[],not:[]};
let history=[];
let topList=[];
let moveTarget=null;
let expandedCat=null;
let showNarrow=false;
let showText=false;
let copied=false;
const TOTAL=V.length;

function render(){
  const done=deck.length===0;
  const progress=TOTAL-deck.length;
  document.getElementById("pf").style.width=`${(progress/TOTAL)*100}%`;
  document.getElementById("pl1").textContent=`${progress}/${TOTAL} 完了`;
  document.getElementById("pl2").textContent=done?"✓ 仕分け完了":`残り ${deck.length} 枚`;
  const mainEl=document.getElementById("main");
  if(!done){
    const cur=deck[0];
    mainEl.innerHTML=`
      <div class="undo-row">
        <button class="btn-sm" id="undobtn" ${!history.length?"disabled":""}>← 戻る</button>
      </div>
      <div class="card">
        <div class="card-num">No.${cur.id} / 100</div>
        <div class="card-ja">${cur.ja}</div>
        <div class="card-en">${cur.en}</div>
        <div class="card-desc">${cur.desc}</div>
      </div>
      <div class="btns">
        ${CATS.map(c=>`<button class="btn-sort btn-${c.key}" data-cat="${c.key}">${c.label}</button>`).join("")}
      </div>`;
    document.getElementById("undobtn")?.addEventListener("click",()=>{undo();render();});
    mainEl.querySelectorAll("[data-cat]").forEach(b=>b.addEventListener("click",()=>{sortCard(b.dataset.cat);render();}));
  } else {
    const veryAll=sorted.most.concat(sorted.very);
    let narrowHTML="";
    if(showNarrow){
      narrowHTML=`<div class="narrow-box">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem">
          <div class="narrow-title">「最も重要」「とても重要」からトップを選択（最大10個）</div>
          <span class="narrow-count">${topList.length}/10</span>
        </div>
        <div class="tags">${veryAll.map(v=>{const sel=topList.find(x=>x.id===v.id);return`<span class="tag" data-topid="${v.id}" style="background:${sel?"#ddeeff":"#f0f0f0"};border-color:${sel?"#2980b9":"#ddd"};color:${sel?"#2980b9":"#666"};opacity:${topList.length>=10&&!sel?0.35:1};cursor:${topList.length>=10&&!sel?"not-allowed":"pointer"}">${v.ja}</span>`}).join("")}
        </div>
        <div style="text-align:right;margin-top:8px"><button class="btn-sm" id="closeNarrow">閉じる</button></div>
      </div>`;
    }
    const topForQ=topList.length>0?topList:veryAll.slice(0,5);
    let interviewHTML="";
    if(topForQ.length>0){
      const questions=[
        v=>`「<span class="q-val">${v}</span>」はあなたにとってどんな意味がありますか？`,
        v=>`なぜ「<span class="q-val">${v}</span>」を重要な価値観として選びましたか？`,
        v=>`「<span class="q-val">${v}</span>」はあなたにとってどのような意味で重要ですか？`,
        v=>`日常生活で「<span class="q-val">${v}</span>」をどのように示してきましたか？`,
        v=>`「<span class="q-val">${v}</span>」にさらに忠実に生きるとしたら、どんなことができますか？`,
      ];
      interviewHTML=`<div class="interview-box">
        <div class="interview-title">面談用 振り返り質問<br><span style="font-weight:400;font-size:12px;color:#999">上位価値観：${topForQ.map(v=>`<strong style="color:#333">${v.ja}</strong>`).join("、")}</span></div>
        ${questions.map((qfn,i)=>`<div class="q-card" data-q="${i}">${qfn(topForQ[Math.min(i,topForQ.length-1)].ja)}</div>`).join("")}
        <div class="q-hint">クリックするとテキストをコピーできます。出典の推奨質問（Miller et al., 2011）</div>
      </div>`;
    }
    mainEl.innerHTML=`
      ${narrowHTML}
      <div class="done-box">
        <div class="done-title">結果を保存</div>
        <div class="dl-row">
          <button class="btn-dl img" id="dlimg">📄 画像で保存</button>
          <button class="btn-dl txt ${copied?"ok":""}" id="dlcopy">${copied?"✓ コピー完了":"📋 テキストコピー"}</button>
        </div>
        <button class="toggle-link" id="togglePreview">${showText?"テキストを閉じる":"テキストプレビュー"}</button>
        ${showText?`<pre class="preview">${genText()}</pre>`:""}
      </div>
      ${interviewHTML}
      <div style="text-align:center;margin-top:1rem;margin-bottom:.5rem;display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
        <button class="btn-sm" id="restart">最初からやり直す</button>
        ${veryAll.length>0?`<button class="btn-sm" id="openNarrow">トップ${topList.length?topList.length+"を編集":"を選ぶ"}</button>`:""}
      </div>`;
    document.getElementById("dlimg")?.addEventListener("click",()=>{try{dlImage();}catch(e){console.error(e);}});
    document.getElementById("dlcopy")?.addEventListener("click",()=>{doCopy();});
    document.getElementById("togglePreview")?.addEventListener("click",()=>{showText=!showText;render();});
    document.getElementById("restart")?.addEventListener("click",()=>{deck=shuffle([...V]);sorted={most:[],very:[],imp:[],some:[],not:[]};history=[];topList=[];moveTarget=null;expandedCat=null;showNarrow=false;showText=false;render();});
    document.getElementById("openNarrow")?.addEventListener("click",()=>{showNarrow=true;render();});
    document.getElementById("closeNarrow")?.addEventListener("click",()=>{showNarrow=false;render();});
    mainEl.querySelectorAll("[data-topid]").forEach(el=>el.addEventListener("click",()=>{
      const id=parseInt(el.dataset.topid);const v=V.find(x=>x.id===id);if(!v)return;
      if(topList.find(x=>x.id===id)){topList=topList.filter(x=>x.id!==id);}
      else if(topList.length<10){topList.push(v);}
      render();
    }));
    mainEl.querySelectorAll(".q-card").forEach(el=>el.addEventListener("click",()=>{
      const t=el.textContent.trim();
      if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).catch(()=>{});}
    }));
  }
  renderSections();
}

function renderSections(){
  const done=deck.length===0;
  const secsEl=document.getElementById("secs");
  const tiers=[
    {key:"top",label:"★ トップ",items:topList,show:topList.length>0,color:"#2980b9",bg:"#ddeeff",border:"#90bce0"},
    ...CATS.map(c=>({key:c.key,label:c.label,items:sorted[c.key],show:true,color:c.color,bg:c.bg,border:c.border})),
  ];
  secsEl.innerHTML=tiers.filter(t=>t.show||t.items.length>0).map(tier=>{
    const isExp=expandedCat===tier.key;
    const preview=tier.items.slice(0,20).map(v=>`<span class="tag" style="background:${tier.bg};border-color:${tier.border};color:${tier.color}">${v.ja}</span>`).join("")+(tier.items.length>20?`<span style="font-size:11px;color:#bbb">+${tier.items.length-20}</span>`:"");
    let expanded="";
    if(isExp){
      const mv=moveTarget;
      const tagList=tier.items.map(v=>{
        const isSel=mv&&mv.card.id===v.id&&mv.fromCat===tier.key;
        return`<span class="tag" data-mv-id="${v.id}" data-mv-from="${tier.key}" style="background:${tier.bg};border-color:${isSel?tier.color:tier.border};border-width:${isSel?"2px":"1px"};color:${tier.color};cursor:${done?"pointer":"default"}">${v.ja}${done?` <span style="font-size:9px;opacity:.4">↕</span>`:""}</span>`;}).join("");
      let mvMenu="";
      if(done&&mv&&mv.fromCat===tier.key){
        const targets=[{key:"top",label:"★ トップ"},...CATS.map(c=>({key:c.key,label:c.label}))].filter(t=>t.key!==tier.key);
        mvMenu=`<div class="move-menu"><div class="move-label">「${mv.card.ja}」を移動：</div><div class="move-btns">${targets.map(t=>`<button class="btn-move" data-to="${t.key}">${t.label}</button>`).join("")}</div></div>`;
      }
      expanded=`<div class="sec-body"><div class="tags">${tagList||'<span style="font-size:12px;color:#bbb">なし</span>'}</div>${mvMenu}</div>`;
    }
    return`<div class="sec">
      <div class="sec-hdr" data-seckey="${tier.key}">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="sec-title" style="color:${tier.color}">${tier.label}</span>
          <span class="sec-badge">${tier.items.length}</span>
        </div>
        <span class="sec-arrow" style="${isExp?"transform:rotate(180deg)":""}">▼</span>
      </div>
      ${!isExp&&tier.items.length>0?`<div style="padding:0 14px 10px"><div class="tags">${preview}</div></div>`:""}
      ${expanded}
    </div>`;
  }).join("");

  secsEl.querySelectorAll("[data-seckey]").forEach(el=>el.addEventListener("click",()=>{
    const k=el.dataset.seckey;expandedCat=expandedCat===k?null:k;moveTarget=null;renderSections();
  }));
  secsEl.querySelectorAll("[data-mv-id]").forEach(el=>el.addEventListener("click",e=>{
    e.stopPropagation();if(deck.length>0)return;
    const id=parseInt(el.dataset.mvId);const from=el.dataset.mvFrom;const v=V.find(x=>x.id===id);
    if(moveTarget&&moveTarget.card.id===id&&moveTarget.fromCat===from){moveTarget=null;}
    else{moveTarget={card:v,fromCat:from};}
    renderSections();
  }));
  secsEl.querySelectorAll("[data-to]").forEach(el=>el.addEventListener("click",e=>{
    e.stopPropagation();if(!moveTarget)return;
    const to=el.dataset.to;const{card,fromCat}=moveTarget;
    if(fromCat==="top"){
      topList=topList.filter(x=>x.id!==card.id);
    } else {
      sorted[fromCat]=sorted[fromCat].filter(x=>x.id!==card.id);
      topList=topList.filter(x=>x.id!==card.id);
      if(to==="top"){
        const inHigh=sorted.most.find(x=>x.id===card.id)||sorted.very.find(x=>x.id===card.id);
        if(!inHigh){sorted.most=[...sorted.most,card];}
        if(topList.length<10)topList=[...topList,card];
      } else {
        sorted[to]=[...sorted[to],card];
      }
    }
    moveTarget=null;render();
  }));
}

function sortCard(cat){const cur=deck[0];if(!cur)return;history.push({card:cur,cat});sorted[cat]=[...sorted[cat],cur];deck=deck.slice(1);}
function undo(){if(!history.length)return;const last=history[history.length-1];history=history.slice(0,-1);sorted[last.cat]=sorted[last.cat].filter(c=>c.id!==last.card.id);deck=[last.card,...deck];}

function genText(){
  const d=new Date();const ds=`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")}`;
  let t="";
  t+="══════════════════════════════════\n  価値観カードソート 結果\n  "+ds+"\n  出典: Miller et al. (2011)\n══════════════════════════════════\n\n";
  if(topList.length){
    t+=`★ 核心的価値観 トップ${topList.length}\n──────────────────────────────────\n`;
    topList.forEach((v,i)=>{t+=`  ${String(i+1).padStart(2," ")}. ${v.ja}（${v.en}）\n      ${v.desc}\n`;});
    t+="\n";
  }
  CATS.forEach(c=>{t+=`${c.label}（${sorted[c.key].length}個）\n──────────────────────────────────\n  ${sorted[c.key].map(v=>v.ja).join("、")||"なし"}\n\n`;});
  t+="──────────────────────────────────\n出典: Miller, C'de Baca, Matthews &\nWilbourne (2011) Personal Values Card Sort\nUniversity of New Mexico\n";
  return t;
}

function doCopy(){
  const t=genText();const ok=()=>{copied=true;render();setTimeout(()=>{copied=false;render();},2000);};
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(ok).catch(()=>{fb(t);ok();});}
  else{fb(t);ok();}
}
function fb(text){const ta=document.createElement("textarea");ta.value=text;ta.style.position="fixed";ta.style.left="-9999px";document.body.appendChild(ta);ta.select();try{document.execCommand("copy");}catch(e){}document.body.removeChild(ta);}

function dlImage(){
  const d=new Date();const ds=`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")}`;
  const top=topList.length>0?topList:[];
  const W=1100;
  const bodyRows=top.length*2+2+CATS.reduce((a,c)=>a+2+Math.ceil(Math.max(sorted[c.key].length,1)/6),0)+4;
  const H=Math.max(900,220+bodyRows*30+160);
  const cv=document.createElement("canvas");cv.width=W;cv.height=H;
  const x=cv.getContext("2d");
  x.fillStyle="#fafafa";x.fillRect(0,0,W,H);
  x.fillStyle="#f0f0ee";x.fillRect(0,0,W,80);
  x.strokeStyle="#e0e0e0";x.lineWidth=1;x.beginPath();x.moveTo(0,80);x.lineTo(W,80);x.stroke();
  x.textAlign="center";x.fillStyle="#1a1a1a";x.font="bold 30px 'Noto Sans JP',sans-serif";x.fillText("価値観カードソート 結果",W/2,50);
  x.fillStyle="#999";x.font="13px sans-serif";x.fillText(ds+" ／ Miller, C'de Baca, Matthews & Wilbourne (2011) University of New Mexico",W/2,70);
  let y=115;x.textAlign="left";
  if(top.length){
    x.fillStyle="#2980b9";x.font="bold 19px sans-serif";x.fillText(`★ 核心的価値観 トップ${top.length}`,60,y);y+=28;
    top.forEach((v,i)=>{x.fillStyle="#1a1a1a";x.font="bold 17px sans-serif";x.fillText(`${i+1}. ${v.ja}（${v.en}）`,80,y);y+=22;
      x.fillStyle="#777";x.font="13px sans-serif";x.fillText(v.desc,100,y);y+=28;});
    y+=8;
  }
  CATS.forEach(c=>{
    x.fillStyle=c.color;x.font="bold 17px sans-serif";x.fillText(`${c.label}（${sorted[c.key].length}個）`,60,y);y+=26;
    if(sorted[c.key].length){
      const names=sorted[c.key].map(v=>v.ja);const cols=6;
      for(let r=0;r<Math.ceil(names.length/cols);r++){
        x.fillStyle="#444";x.font="14px sans-serif";x.fillText(names.slice(r*cols,(r+1)*cols).join("  "),80,y);y+=22;
      }
    } else {x.fillStyle="#ccc";x.font="13px sans-serif";x.fillText("なし",80,y);y+=22;}
    y+=8;
  });
  const a=document.createElement("a");a.download=`価値観カードソート_${d.toISOString().slice(0,10)}.png`;a.href=cv.toDataURL("image/png");document.body.appendChild(a);a.click();document.body.removeChild(a);
}

render();
</script>
</body>
</html>
